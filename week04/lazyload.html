<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading Demonstration</title>
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
</head>
<body>

    <main>
        <h1>Latter-day Prophet & Apostles: Responsive Lazy Loading Gallery</h1>
        
        <!-- Six portrait images with lazy loading enabled -->
        <picture>
            <img src="images/Oaks.jpg" alt="President Oaks" width="400" height="600" loading="lazy">
        </picture>
        <picture>
            <img src="images/eyring.jpg" alt="President Eyring" width="400" height="600" loading="lazy">
        </picture>
        <picture>
            <img src="images/uchtdorf.jpg" alt="Elder Uchtdorf" width="400" height="600" loading="lazy">
        </picture>
        <picture>
            <img src="images/cook.jpg" alt="Elder Cook" width="400" height="600" loading="lazy">
        </picture>
        <picture>
            <img src="images/bednar.jpg" alt="Elder Bednar" width="400" height="600" loading="lazy">
        </picture>
        <picture>
            <img src="images/christofferson.jpg" alt="President Christofferson" width="400" height="600" loading="lazy">
        </picture>
    </main>

    <footer>
        <p>&copy; 2026 Later-day Prophets | KCMinchakpu | WDD131 </p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>

</body>
</html>
